<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>অ্যাডমিন ড্যাশবোর্ড</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Serif Bengali', serif;
      background: #f5f5f5;
    }

    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .admin-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .admin-header h1 {
      font-size: 28px;
      margin: 0;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.3);
      border: 2px solid white;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Noto Serif Bengali', serif;
      font-size: 14px;
      transition: background 0.3s ease;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .admin-nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .nav-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      border: 2px solid transparent;
      text-align: center;
    }

    .nav-card:hover {
      transform: translateY(-5px);
      border-color: #667eea;
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
    }

    .nav-card-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .nav-card-title {
      font-weight: bold;
      color: #333;
    }

    .admin-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .content-section {
      display: none;
    }

    .content-section.active {
      display: block;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: bold;
      margin: 10px 0;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .users-table th {
      background: #f5f5f5;
      padding: 12px;
      text-align: right;
      font-weight: bold;
      border-bottom: 2px solid #ddd;
    }

    .users-table td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: right;
    }

    .users-table tbody tr:hover {
      background: #f9f9f9;
    }

    .action-buttons {
      display: flex;
      gap: 5px;
    }

    .user-status {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }

    .status-active {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status-blocked {
      background: #ffebee;
      color: #d32f2f;
    }

    .status-trial {
      background: #fff3e0;
      color: #e65100;
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #555;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: 'Noto Serif Bengali', serif;
      font-size: 14px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Noto Serif Bengali', serif;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-danger {
      background: #d32f2f;
      color: white;
    }

    .btn-danger:hover {
      background: #b71c1c;
    }

    .btn-success {
      background: #4caf50;
      color: white;
    }

    .btn-success:hover {
      background: #388e3c;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }

    .no-data {
      text-align: center;
      color: #999;
      padding: 40px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      margin-bottom: 20px;
    }

    .modal-header h3 {
      margin: 0;
      color: #333;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .modal-actions button {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <div>
        <h1>👨‍💼 অ্যাডমিন ড্যাশবোর্ড</h1>
      </div>
      <button class="logout-btn" onclick="adminApp.logout()">লগ আউট</button>
    </div>

    <div class="admin-nav" id="navCards"></div>

    <div class="admin-content">
      <!-- Dashboard Section -->
      <div class="content-section active" id="dashboardSection">
        <h2>ড্যাশবোর্ড</h2>
        <div class="dashboard-grid" id="statsGrid"></div>
        <div id="recentActivity"></div>
      </div>

      <!-- Users Section -->
      <div class="content-section" id="usersSection">
        <h2>ব্যবহারকারী ব্যবস্থাপনা</h2>
        <div id="usersContent"></div>
      </div>

      <!-- Vouchers Section -->
      <div class="content-section" id="vouchersSection">
        <h2>ভাউচার</h2>
        <div id="vouchersContent"></div>
      </div>

      <!-- Settings Section -->
      <div class="content-section" id="settingsSection">
        <h2>সিস্টেম সেটিংস</h2>
        <div id="settingsContent"></div>
      </div>

      <!-- Logs Section -->
      <div class="content-section" id="logsSection">
        <h2>অডিট লগ</h2>
        <div id="logsContent"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
      </div>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="adminApp.handleModalSubmit()">নিশ্চিত করুন</button>
        <button class="btn" style="background: #ddd; color: #333;" onclick="adminApp.closeModal()">বাতিল</button>
      </div>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
